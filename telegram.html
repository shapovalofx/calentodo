<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calentodobot - Telegram WebApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #000000;
            --tg-theme-text-color: #ffffff;
            --tg-theme-hint-color: #999999;
            --tg-theme-link-color: #2481cc;
            --tg-theme-button-color: #2481cc;
            --tg-theme-button-text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            min-height: 100vh;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            gap: 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--tg-theme-hint-color);
            border-top: 3px solid var(--tg-theme-button-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--tg-theme-hint-color);
            font-size: 16px;
        }

        .error {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            text-align: center;
        }

        .error-text {
            color: #ff6b6b;
            font-size: 16px;
            max-width: 300px;
        }

        .retry-btn {
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .retry-btn:hover {
            opacity: 0.8;
        }

        #root {
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div id="telegram-root">
        <div class="loading">
            <div class="spinner"></div>
            <div class="loading-text">Загрузка Calentodobot...</div>
        </div>
    </div>

    <script>
        // Проверяем доступность Telegram WebApp
        function initTelegramApp() {
            if (window.Telegram && window.Telegram.WebApp) {
                const webApp = window.Telegram.WebApp;
                
                // Инициализируем WebApp
                webApp.ready();
                webApp.expand();
                
                // Применяем тему
                const theme = webApp.themeParams;
                if (theme.bg_color) {
                    document.documentElement.style.setProperty('--tg-theme-bg-color', theme.bg_color);
                }
                if (theme.text_color) {
                    document.documentElement.style.setProperty('--tg-theme-text-color', theme.text_color);
                }
                if (theme.hint_color) {
                    document.documentElement.style.setProperty('--tg-theme-hint-color', theme.hint_color);
                }
                if (theme.link_color) {
                    document.documentElement.style.setProperty('--tg-theme-link-color', theme.link_color);
                }
                if (theme.button_color) {
                    document.documentElement.style.setProperty('--tg-theme-button-color', theme.button_color);
                }
                if (theme.button_text_color) {
                    document.documentElement.style.setProperty('--tg-theme-button-text-color', theme.button_text_color);
                }
                
                // Настраиваем главную кнопку
                webApp.MainButton.setText('Открыть в браузере');
                webApp.MainButton.onClick(() => {
                    window.open(window.location.href.replace('/telegram.html', '/'), '_blank');
                });
                
                console.log('Telegram WebApp initialized successfully');
                console.log('User:', webApp.initDataUnsafe.user);
                console.log('Theme:', theme);
                
                // Загружаем основное приложение
                loadMainApp();
                
            } else {
                showError('Telegram WebApp не доступен. Попробуйте открыть приложение из Telegram.');
            }
        }

        function loadMainApp() {
            // Создаем iframe для загрузки основного приложения
            const iframe = document.createElement('iframe');
            iframe.src = './'; // Загружаем основное приложение
            iframe.style.width = '100%';
            iframe.style.height = '100vh';
            iframe.style.border = 'none';
            iframe.style.position = 'fixed';
            iframe.style.top = '0';
            iframe.style.left = '0';
            iframe.style.background = 'var(--tg-theme-bg-color)';
            
            // Заменяем загрузчик на iframe
            document.getElementById('telegram-root').innerHTML = '';
            document.getElementById('telegram-root').appendChild(iframe);
            
            // Обрабатываем загрузку
            iframe.onload = () => {
                console.log('Main app loaded successfully');
            };
            
            iframe.onerror = () => {
                showError('Ошибка загрузки приложения');
            };
        }

        function showError(message) {
            document.getElementById('telegram-root').innerHTML = `
                <div class="error">
                    <div class="error-text">${message}</div>
                    <button class="retry-btn" onclick="location.reload()">Попробовать снова</button>
                </div>
            `;
        }

        // Инициализация при загрузке страницы
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initTelegramApp);
        } else {
            initTelegramApp();
        }

        // Обработка ошибок
        window.addEventListener('error', (event) => {
            console.error('Application error:', event.error);
            showError('Произошла ошибка в приложении');
        });
    </script>
</body>
</html>
